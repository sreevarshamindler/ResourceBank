<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ICCC Resource Bank</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

body{
    margin:0;
    font-family:Inter,Arial,sans-serif;
    background:#f4f7fb;
}

/* ================= HEADER ================= */

.header{

    height:70px;

    background:#fff;

    border-bottom:1px solid #e5e7eb;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 40px;
}

.header img{

    height:34px;
}

.header nav a{

    text-decoration:none;

    color:#8b97ab;

    font-size:15px;

    font-weight:600;

    margin-left:42px;
}

.header nav a:hover{

    color:#0b73b9;
}


/* ================= LAYOUT ================= */

.dashboard{

    display:flex;

    height:calc(100vh - 70px);

    overflow:hidden;
}


/* ================= SIDEBAR ================= */

.sidebar{

    width:275px;

    background:#fff;

    border-right:1px solid #e5e7eb;

    display:flex;

    flex-direction:column;
}

.profile{

    padding:18px;

    border-bottom:1px solid #ececec;

    font-weight:500;

    color:#2f4057;
}

.menu{

    list-style:none;

    margin:0;

    padding:14px 0;
}

.menu li{

    margin:4px 12px;
}

.menu a{

    display:flex;

    align-items:center;

    gap:12px;

    text-decoration:none;

    color:#2f4057;

    padding:12px 14px;

    border-radius:8px;

    font-size:16px;

    transition:.2s;
}

.menu a:hover{

    background:#f5f8fb;
}

.menu .active{

    background:#0b73b9;

    color:white;

    font-weight:600;
}

.menu-icon-img{

    width:22px;

    height:22px;

    object-fit:contain;
}

.menu-icon-svg{

    width:20px;

    height:20px;

    fill:#0b73b9;
}

/* ================= PROMO ================= */

.promo{

    margin:auto 16px 18px;

    background:#0b73b9;

    color:white;

    border-radius:14px;

    text-align:center;

    padding:28px 18px;
}

.promo h3{

    margin-top:0;

    font-size:18px;
}

.promo p{

    font-size:14px;

    line-height:1.5;
}

.promo button{

    margin-top:14px;

    background:white;

    color:#0b73b9;

    border:none;

    padding:10px 22px;

    border-radius:8px;

    font-weight:600;

    cursor:pointer;
}

/* ================= MAIN ================= */

.main{

    flex:1;

    overflow-y:auto;

    padding:30px 40px;
}

</style>

</head>

<body>

<header class="header">

    <img src="https://mindlerimages.imgix.net/iccc_new/mindler-big-blue.png">

    <nav>

        <a href="#">HOME</a>

        <a href="#">FAQs</a>

        <a href="#">CONTACT</a>

    </nav>

</header>


<div class="dashboard">

<aside class="sidebar">

    <div class="profile">

        Sree Varsha

    </div>

    <ul class="menu">

        <li>
            <a href="#">
                <img src="https://mindlerimages.imgix.net/iccc_new/ICCC-basic.svg"
                class="menu-icon-img">
                ICCC Foundation
            </a>
        </li>

        <li>
            <a href="#">
                <svg class="menu-icon-svg" viewBox="0 0 512 512">
                    <path d="M472,16H168a24,24,0,0,0-24,24V344a24,24,0,0,0,24,24H472a24,24,0,0,0,24-24V40A24,24,0,0,0,472,16Zm-8,320H176V48H464Z"></path>
                    <path d="M112,400V80H80V408a24,24,0,0,0,24,24H432V400Z"></path>
                    <path d="M48,464V144H16V472a24,24,0,0,0,24,24H368V464Z"></path>
                </svg>
                Foundation Resources
            </a>
        </li>

        <li>
            <a href="#">
                <img src="https://mindlerimages.imgix.net/iccc_new/ICCC-advanced.svg"
                class="menu-icon-img">
                ICCC Advanced
            </a>
        </li>

        <li>
            <a href="#">
                <img src="https://mindlerimages.imgix.net/iccc_new/ICCC-advanced.svg"
                class="menu-icon-img">
                Coachapreneur Program
            </a>
        </li>

        <li>
            <a href="#">
                <img src="https://mindlerimages.imgix.net/iccc_new/ICCC-advanced.svg"
                class="menu-icon-img">
                ICCC Overseas
            </a>
        </li>

        <li>
            <a href="#">
                <img src="https://mindlerimages.imgix.net/iccc_new/ICCC-master.svg"
                class="menu-icon-img">
                ICCC Master
            </a>
        </li>

        <li>
            <a class="active" href="#">
                <i class="fa-solid fa-book-open"></i>
                Resource Bank
            </a>
        </li>

        <li>
            <a href="#">
                <img src="https://mindlerimages.imgix.net/iccc_new/ICCC-master.svg"
                class="menu-icon-img">
                Take Assessment
            </a>
        </li>

    </ul>

    <div class="promo">

        <h3>Become a Coachapreneur</h3>

        <p>

            Combine ICCC Advanced and Mindler Partner for unbeatable career coaching success.

        </p>

        <button>

            Learn More

        </button>

    </div>

</aside>

<main class="main">

<!-- Part 2 goes here -->

</main>

</div>

</body>

</html>
